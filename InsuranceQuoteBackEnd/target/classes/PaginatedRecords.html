<!DOCTYPE html>
<html>
<head>
    <title>Insured Items Pagination</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Insured Items</h2>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Value</th>
        </tr>
        </thead>
        <tbody id="items-table-body"></tbody>
    </table>
    <div class="d-flex justify-content-between align-items-center">
        <button id="prev-btn" class="btn btn-primary" disabled>&larr; Previous</button>
        <span id="page-info" class="fw-bold"></span>
        <button id="next-btn" class="btn btn-primary">Next &rarr;</button>
    </div>
</div>
<script>
    let page = 0;
    const size = 5;
    let totalPages = 1;

    function fetchItems() {
        fetch(`http://localhost:8888/paginated?page=${page}&size=${size}`)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('items-table-body');
                tbody.innerHTML = '';
                data.content.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.id}</td><td>${item.productType}</td><td>${item.productValue}</td>`;
                    tbody.appendChild(tr);
                });
                totalPages = data.totalPages;
                document.getElementById('page-info').textContent = `Page ${page + 1} of ${totalPages}`;
                document.getElementById('prev-btn').disabled = page === 0;
                document.getElementById('next-btn').disabled = page + 1 >= totalPages;
            });
    }

    document.getElementById('prev-btn').onclick = function() {
        if (page > 0) {
            page--;
            fetchItems();
        }
    };

    document.getElementById('next-btn').onclick = function() {
        if (page + 1 < totalPages) {
            page++;
            fetchItems();
        }
    };

    fetchItems();
</script>
</body>
</html>
